version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-agent-chroma
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ai-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ -f /proc/1/cmdline ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ai-agent-app
    env_file:
      - .env.docker
    environment:
      - CHROMA_URL=http://chromadb:8000
    volumes:
      - ./documents:/app/documents:ro
    networks:
      - ai-agent-network
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: ai-agent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai-agent-network
    depends_on:
      nestjs-app:
        condition: service_healthy
    restart: unless-stopped

networks:
  ai-agent-network:
    driver: bridge

volumes:
  chroma_data:
    driver: local
